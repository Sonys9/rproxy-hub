name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Rustlang
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Fmt check
        run: cargo fmt --all -- --check
      - name: Clippy Linter
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test --all
